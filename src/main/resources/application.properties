spring.application.name=portfolio-copilot-seminar
spring.datasource.url=jdbc:sqlite:data/portfolio-copilot.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8
spring.thymeleaf.cache=false
spring.mvc.hiddenmethod.filter.enabled=true

# AI: デフォルトは OpenAI。anthropic にする場合は app.ai.provider=anthropic と ANTHROPIC_API_KEY を設定
app.ai.provider=openai
app.ai.openai.base-url=https://api.openai.com
app.ai.openai.chat-completions-path=/v1/chat/completions
app.ai.openai.model=${OPENAI_MODEL:gpt-4o-mini}
app.ai.openai.api-key=${OPENAI_API_KEY:}
app.ai.openai.max-tokens=1200

app.ai.anthropic.base-url=https://api.anthropic.com
app.ai.anthropic.messages-path=/v1/messages
app.ai.anthropic.model=${ANTHROPIC_MODEL:claude-3-5-sonnet-latest}
app.ai.anthropic.api-key=${ANTHROPIC_API_KEY:}
app.ai.anthropic.max-tokens=1200
