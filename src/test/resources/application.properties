spring.datasource.url=jdbc:sqlite:file:portfolio-test?mode=memory&cache=shared
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8
spring.thymeleaf.cache=false

app.ai.provider=openai
app.ai.openai.base-url=https://api.openai.com
app.ai.openai.chat-completions-path=/v1/chat/completions
app.ai.openai.model=gpt-4o-mini
app.ai.openai.api-key=test-key
app.ai.openai.max-tokens=1200

app.ai.anthropic.base-url=https://api.anthropic.com
app.ai.anthropic.messages-path=/v1/messages
app.ai.anthropic.model=claude-3-5-sonnet-latest
app.ai.anthropic.api-key=test-key
app.ai.anthropic.max-tokens=1200
